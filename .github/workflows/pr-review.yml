name: PR Review with Claude Code

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff against base
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          echo "Diff size: $(wc -l < /tmp/pr.diff) lines"
          if [ $(wc -l < /tmp/pr.diff) -gt 2000 ]; then
            echo "Diff exceeds 2000 lines - truncating for review."
            head -n 2000 /tmp/pr.diff > /tmp/pr.diff.truncated
            mv /tmp/pr.diff.truncated /tmp/pr.diff
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review PR with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT=$(cat <<'PROMPT_EOF'
          You are a code reviewer for the bookmark-manager FastAPI project.
          Review the diff below and identify issues. Cross-reference against
          the hard rules in CLAUDE.md (read it from the repo root).

          Respond ONLY with a JSON object matching this schema:

          {
            "summary": "<one-sentence overall assessment>",
            "issues": [
              {
                "severity": "critical | high | medium | low",
                "file": "<file path>",
                "line": "<line number or null>",
                "rule": "<hard rule violated, or general>",
                "description": "<one-sentence description>"
              }
            ]
          }

          Severity guide:
          - critical: hard-rule violations, security issues, data loss risks
          - high: bugs, broken logic, missing error handling
          - medium: maintainability issues, unclear code
          - low: style nits, optional improvements

          Rules:
          - Respond with raw JSON only. No prose. No markdown fences.
          - If no issues are found, return an empty issues array.
          - Only flag issues you are confident about.

          DIFF:
          PROMPT_EOF
          )

          DIFF=$(cat /tmp/pr.diff)
          FULL_PROMPT="${PROMPT}
          ${DIFF}"

          echo "$FULL_PROMPT" | claude -p \
            --output-format json \
            --max-turns 5 \
            --dangerously-skip-permissions \
            > /tmp/response.json

          echo "--- Raw response ---"
          cat /tmp/response.json
          echo "--- End raw response ---"

      - name: Parse JSON and format comment
        run: |
          ERROR=$(jq -r '.error // empty' /tmp/response.json)
          if [ -n "$ERROR" ]; then
            echo "Claude Code returned an error: $ERROR"
            exit 1
          fi

          COST=$(jq -r '.cost_usd // "unknown"' /tmp/response.json)
          TURNS=$(jq -r '.num_turns // "unknown"' /tmp/response.json)
          echo "Review cost: \$${COST} | Turns used: ${TURNS}"

          INNER=$(jq -r '.result' /tmp/response.json)
          INNER=$(echo "$INNER" | sed -e '/^```json$/d' -e '/^```$/d')

          echo "$INNER" > /tmp/findings.json
          if ! jq empty /tmp/findings.json 2>/dev/null; then
            echo "Claude's response was not valid JSON. Raw output:"
            cat /tmp/findings.json
            exit 1
          fi

          SUMMARY=$(jq -r '.summary' /tmp/findings.json)
          ISSUE_COUNT=$(jq '.issues | length' /tmp/findings.json)
          CRITICAL=$(jq '[.issues[] | select(.severity == "critical")] | length' /tmp/findings.json)
          HIGH=$(jq '[.issues[] | select(.severity == "high")] | length' /tmp/findings.json)

          {
            echo "## Claude Code Review"
            echo ""
            echo "$SUMMARY"
            echo ""
            echo "**Issues:** $ISSUE_COUNT total ($CRITICAL critical, $HIGH high)"
            echo ""
            if [ "$ISSUE_COUNT" -gt 0 ]; then
              echo "| Severity | File | Line | Rule | Description |"
              echo "|----------|------|------|------|-------------|"
              jq -r '.issues[] | "| \(.severity) | \(.file) | \(.line // "-") | \(.rule) | \(.description) |"' /tmp/findings.json
              echo ""
            fi
            echo "---"
            echo "_Review by Claude Code · Cost: \$${COST} · Turns: ${TURNS}_"
          } > /tmp/comment.md

          echo "--- Comment to post ---"
          cat /tmp/comment.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/comment.md

      - name: Quality gate - fail on critical issues
        run: |
          CRITICAL_COUNT=$(jq '[.issues[] | select(.severity == "critical")] | length' /tmp/findings.json)
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Found $CRITICAL_COUNT critical issue(s)."
            echo "This PR cannot be merged until critical issues are resolved."
            exit 1
          fi
          echo "No critical issues found."